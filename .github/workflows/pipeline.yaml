# name used to identify this pipeline
name: CI Pipeline

# define the trigger event what action in github should start the pipeline
on:
  # trigger - when push code
  push:
    # only when pushes or merge main
    branches: [main]

# grp of steps run together - container multiple actions executed sequentially
jobs:
  # name of the job
  build:
    # define what it will run on
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 16

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run : npm test